name: Pipeline 2 - Staging Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER_LC: ${{ github.repository_owner }}
  BACKEND_IMAGE: devopscourseproject-backend
  FRONTEND_IMAGE: devopscourseproject-frontend
  STAGING_BACKEND_HEALTH_PATH: /api/health
  STAGING_FRONTEND_HEALTH_URL: http://127.0.0.1/

jobs:
  build-and-push:
    name: Build and push staging images
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      build_tag: ${{ steps.meta.outputs.build_tag }}

    steps:
      - name: Check out staging code
        uses: actions/checkout@v4

      - name: Build number
        id: meta
        shell: bash
        run: echo "build_tag=build-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        shell: bash
        run: |
          docker build -t ghcr.io/${OWNER_LC,,}/${BACKEND_IMAGE}:${{ steps.meta.outputs.build_tag }} ./apps/backend
          docker push ghcr.io/${OWNER_LC,,}/${BACKEND_IMAGE}:${{ steps.meta.outputs.build_tag }}

      - name: Build and push frontend image
        shell: bash
        run: |
          docker build -t ghcr.io/${OWNER_LC,,}/${FRONTEND_IMAGE}:${{ steps.meta.outputs.build_tag }} ./apps/frontend
          docker push ghcr.io/${OWNER_LC,,}/${FRONTEND_IMAGE}:${{ steps.meta.outputs.build_tag }}

  deploy-to-staging:
    name: Deploy to staging on self-hosted runner
    runs-on: [self-hosted, staging]
    environment: staging
    needs: build-and-push

    steps:
      - name: Check out staging code
        uses: actions/checkout@v4

      - name: Log in to GHCR on staging VM
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Prepare runtime environment file
        shell: bash
        env:
          BUILD_TAG: ${{ needs.build-and-push.outputs.build_tag }}
          STAGING_DB_HOST: ${{ secrets.STAGING_DB_HOST }}
          STAGING_DB_PORT: ${{ secrets.STAGING_DB_PORT }}
          STAGING_DB_NAME: ${{ secrets.STAGING_DB_NAME }}
          STAGING_DB_USER: ${{ secrets.STAGING_DB_USER }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          mkdir -p /home/deploy/myproject/app/env
          cat > /home/deploy/myproject/app/env/app.env <<EOF
          TAG=${BUILD_TAG}
          DB_HOST=${STAGING_DB_HOST}
          DB_PORT=${STAGING_DB_PORT}
          DB_NAME=${STAGING_DB_NAME}
          DB_USER=${STAGING_DB_USER}
          DB_PASSWORD=${STAGING_DB_PASSWORD}
          EOF

      - name: Ensure staging deploy script is executable
        shell: bash
        run: chmod +x scripts/staging-deploy.sh

      - name: Run staging deployment locally
        shell: bash
        env:
          BUILD_TAG: ${{ needs.build-and-push.outputs.build_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/staging-deploy.sh

      - name: Staging backend smoke test
        shell: bash
        run: curl -fsS "http://127.0.0.1:3000${STAGING_BACKEND_HEALTH_PATH}"

      - name: Staging frontend smoke test
        shell: bash
        run: curl -fsSI "${STAGING_FRONTEND_HEALTH_URL}"
