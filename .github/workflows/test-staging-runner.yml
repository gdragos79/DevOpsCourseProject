name: Test staging runner

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: [self-hosted, linux, x64, staging]

    steps:
      - name: Show runner identity
        run: |
          echo "Runner is executing this job"
          whoami
          hostname
          pwd
          uname -a

      - name: Check Docker access
        run: |
          docker --version
          docker compose version
          docker ps

      - name: Check app folders
        run: |
          ls -la ~
          ls -la ~/myproject || true
          ls -la ~/myproject/app || true
