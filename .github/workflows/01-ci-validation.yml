name: Pipeline 1 - CI Validation

on:
  pull_request:
    branches:
      - staging
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: apps/frontend
  BACKEND_DIR: apps/backend
  BACKEND_PORT: '3000'
  BACKEND_HEALTH_PATH: /api/health
  TEST_DB_NAME: appdb
  TEST_DB_USER: postgres
  TEST_DB_PASSWORD: postgres
  TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/appdb

jobs:
  validate:
    name: Frontend lint and tests, backend tests, health verification, Docker build validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d appdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out pull request code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ${{ env.BACKEND_DIR }}/package-lock.json
            ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: npm run test

      - name: Start backend for health verification
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          PORT: ${{ env.BACKEND_PORT }}
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: ${{ env.TEST_DB_NAME }}
          DB_USER: ${{ env.TEST_DB_USER }}
          DB_PASSWORD: ${{ env.TEST_DB_PASSWORD }}
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          npm run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${BACKEND_PORT}${BACKEND_HEALTH_PATH}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Verify backend DB probe endpoint
        run: curl -fsS "http://127.0.0.1:${BACKEND_PORT}/api/db"

      - name: Lint frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      - name: Run frontend tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run test

      - name: Validate backend Docker build
        run: docker build -t backend-ci-check ./apps/backend

      - name: Validate frontend Docker build
        run: docker build -t frontend-ci-check ./apps/frontend

      - name: Stop backend process
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" || true
          fi

      - name: Comment on PR if workflow failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Pipeline 1 failed. Open the Actions run, expand the failed step, and fix that problem before merging into staging.'
            })
