name: Development PR Validation

on:
  pull_request:
    branches:
      - development
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: apps/frontend
  BACKEND_DIR: apps/backend

jobs:
  fast-validate:
    name: Fast PR checks for development
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ${{ env.BACKEND_DIR }}/package-lock.json
            ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Run backend tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm run test

      - name: Lint frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      - name: Run frontend tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run test

      - name: Build frontend application
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: Comment on PR if workflow failed
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Development PR validation failed. Fix the failing frontend/backend checks before merging into development.'
            })
