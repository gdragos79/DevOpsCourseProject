name: Pipeline 2 - Staging Deploy (Diagnostic)

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER_LC: ${{ github.repository_owner }}
  BACKEND_IMAGE: devopscourseproject-backend
  FRONTEND_IMAGE: devopscourseproject-frontend
  STAGING_BACKEND_HEALTH_PATH: /api/health
  STAGING_FRONTEND_HEALTH_URL: http://127.0.0.1/

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Check out staging code
        uses: actions/checkout@v4

      - name: Build number
        id: meta
        run: echo "build_tag=build-$(date +%Y%m%d)-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -t ghcr.io/${OWNER_LC,,}/${BACKEND_IMAGE}:${{ steps.meta.outputs.build_tag }} ./apps/backend
          docker push ghcr.io/${OWNER_LC,,}/${BACKEND_IMAGE}:${{ steps.meta.outputs.build_tag }}

      - name: Build and push frontend image
        run: |
          docker build -t ghcr.io/${OWNER_LC,,}/${FRONTEND_IMAGE}:${{ steps.meta.outputs.build_tag }} ./apps/frontend
          docker push ghcr.io/${OWNER_LC,,}/${FRONTEND_IMAGE}:${{ steps.meta.outputs.build_tag }}

      - name: Diagnostic deploy to staging target over SSH
        env:
          APP_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          APP_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          APP_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          BUILD_TAG: ${{ steps.meta.outputs.build_tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          mkdir -p ~/.ssh
          printf '%s\n' "$APP_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -H "$APP_SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes ${APP_SSH_USER}@${APP_SSH_HOST} "echo SSH_OK"

          scp -i ~/.ssh/id_ed25519 scripts/staging-deploy.sh ${APP_SSH_USER}@${APP_SSH_HOST}:/tmp/staging-deploy.sh

          ssh -i ~/.ssh/id_ed25519 ${APP_SSH_USER}@${APP_SSH_HOST} "chmod +x /tmp/staging-deploy.sh && BUILD_TAG='$BUILD_TAG' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash /tmp/staging-deploy.sh"

      - name: Staging backend smoke test
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: curl -fsS "${STAGING_BACKEND_URL}${STAGING_BACKEND_HEALTH_PATH}"

      - name: Staging frontend smoke test
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
        run: curl -fsSI "${STAGING_FRONTEND_URL}"
